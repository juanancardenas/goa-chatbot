services:
  goa-ai1:
    build: .
    image: goa-ai1:latest
    restart: always
    ports:
      - "8086:8086"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:mongo@mongo:27017/goaai1db?authSource=admin
      SPRING_SECURITY_OAUTH2_JWK-URI: http://host.docker.internal:8080/api/goa-user/oauth2/jwks
      SPRING_SECURITY_OAUTH2_TOKEN-URI: http://host.docker.internal:8080/api/goa-user/oauth2/token
    extra_hosts:
      - "host.docker.internal:host-gateway"

#> docker compose up --build -d

# Para ver los logs de arranque
#> docker logs -f goa-ai1