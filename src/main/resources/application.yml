spring:
  application:
    name: goa-chatbot
  profiles:
    active: prod

  output:
    ansi:
      enabled: ALWAYS

  cache:
    type: none

  jackson:
    default-property-inclusion: NON_NULL

server:
  port: 8086

info:
  app:
    artifact: "@project.artifactId@"
    version: "@project.version@"
    build: "@maven.build.timestamp@"

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    root: WARN
    es.upm: DEBUG

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
